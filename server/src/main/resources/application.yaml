spring:
  application:
    name: prereq-visualizer

  # Database configuration — env vars are set by docker-compose;
  # the defaults after the colon work for running locally without Docker.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/prereq_visualizer}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
      hibernate:
        ddl-auto: none
      show-sql: true

server:
  port: 8080